# Vendored from catppuccin/atuin (themes/mocha/catppuccin-mocha-mauve.toml).
# Managed by myplace (chezmoi). atuin has no bundled Catppuccin theme, so the
# file lives here and ~/.config/atuin/config.toml selects it by name. The
# filename stem must equal the [theme] name below.
[theme]
name = "catppuccin-mocha-mauve"

[colors]
AlertInfo = "#a6e3a1"
AlertWarn = "#fab387"
AlertError = "#f38ba8"
Annotation = "#cba6f7"
Base = "#cdd6f4"
Guidance = "#9399b2"
Important = "#f38ba8"
Title = "#cba6f7"
