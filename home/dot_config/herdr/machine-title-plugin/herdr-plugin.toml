id = "valstar.machine-title"
name = "Machine Title"
version = "0.1.0"
min_herdr_version = "0.7.0"
platforms = ["macos", "linux"]
description = "Pin the outer terminal title to herdr@<hostname> · <workspace>."

# Manual trigger, e.g. `herdr plugin action invoke valstar.machine-title.refresh`.
[[actions]]
id = "refresh"
title = "Refresh machine title"
contexts = ["workspace", "tab", "pane"]
command = ["sh", "set-title.sh"]

# Re-assert our title after every event where herdr would otherwise overwrite it
# with its own default ("herdr"). The script is cheap and the title is constant
# per (host, focused workspace), so firing broadly is fine.
[[events]]
on = "workspace.focused"
command = ["sh", "set-title.sh"]
[[events]]
on = "workspace.renamed"
command = ["sh", "set-title.sh"]
[[events]]
on = "tab.focused"
command = ["sh", "set-title.sh"]
[[events]]
on = "pane.focused"
command = ["sh", "set-title.sh"]
[[events]]
on = "pane.agent_status_changed"
command = ["sh", "set-title.sh"]
[[events]]
on = "pane.created"
command = ["sh", "set-title.sh"]
[[events]]
on = "pane.closed"
command = ["sh", "set-title.sh"]
